<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Visualize | Danprel Engineering</title>
    <link rel="icon" type="image/png" href="asset/image.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --navy-prime: #0B2B4A;
            --navy-glow: #1A3F5F;
            --teal-accent: #0d9488;
            --blue-accent: #2D68C4;
            --bg-body: #f1f6fc;
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: #334155;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--navy-prime);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            color: white;
            padding: 24px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 24px;
            margin-bottom: 24px;
        }

        .sidebar-section-title {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .sidebar-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 16px;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 8px;
            border: none;
            background: transparent;
            text-align: left;
        }

        .sidebar-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .sidebar-btn.active {
            background: linear-gradient(135deg, var(--blue-accent), #3b82f6);
            color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        .sb-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* HEADER */
        .app-header {
            background: white;
            margin-left: var(--sidebar-width);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .header-title {
            font-weight: 800;
            color: var(--navy-prime);
            font-size: 1.25rem;
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
        }

        /* GANTT STYLES */
        .gantt-card {
            background: white;
            border-radius: 32px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        .gantt-wrapper {
            overflow-x: auto;
            position: relative;
        }

        .gantt-container {
            min-width: 1500px;
            display: flex;
            flex-direction: column;
        }

        /* GANTT HEADER (Calendar) */
        .gantt-hd {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .gantt-hd-spacer {
            width: 200px;
            border-right: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .month-block {
            flex-shrink: 0;
            width: 320px;
            border-right: 1px solid #e2e8f0;
            text-align: center;
        }

        .month-label {
            padding: 14px;
            font-weight: 900;
            color: var(--navy-prime);
            font-size: 0.8rem;
            border-bottom: 1px solid #e2e8f0;
            text-transform: uppercase;
            background: #fff;
        }

        .weeks-row {
            display: flex;
            background: #f8fafc;
        }

        .week-cell {
            flex: 1;
            padding: 6px;
            font-size: 0.6rem;
            font-weight: 800;
            color: #64748b;
            border-right: 1px solid #e2e8f0;
            text-align: center;
        }

        .week-cell:last-child {
            border-right: none;
        }

        /* GANTT ROWS */
        .project-row {
            display: flex;
            height: 80px;
            border-bottom: 1px solid #f1f5f9;
            background: white;
            transition: background 0.2s;
        }

        .project-row:hover {
            background: #f8fbfe;
        }

        .project-label {
            width: 200px;
            border-right: 1px solid #e2e8f0;
            flex-shrink: 0;
            padding: 15px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: inherit;
            position: sticky;
            left: 0;
            z-index: 10;
        }

        .p-code {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--teal-accent);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .p-name {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--navy-prime);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .timeline-area {
            flex-grow: 1;
            position: relative;
            background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px);
            background-size: 80px 100%;
        }

        /* BARS */
        .bar-main {
            position: absolute;
            height: 28px;
            border-radius: 8px;
            top: 26px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .bar-main:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .bar-dates {
            font-size: 0.55rem;
            opacity: 0.8;
            margin-left: auto;
        }

        /* TOOLTIP */
        .tooltip-custom {
            position: absolute;
            background: var(--navy-prime);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        @media (max-width: 991px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .app-header,
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="d-flex align-items-center gap-3">
                <div style="width: 40px; height: 40px; background: white; border-radius: 12px;">
                    <img src="asset/image.png" alt="logo"
                        style="width: 100%; height:100%; object-fit:contain; padding:5px;">
                </div>
                <div>
                    <div style="font-weight: 900; font-size: 1.1rem; color: white;">DANPREL</div>
                    <div style="font-size: 0.6rem; color: #94a3b8; text-transform: uppercase;">Engineering Automation
                    </div>
                </div>
            </div>
        </div>
        <div class="sidebar-section-title">Navigation</div>
        <a href="project_review.html" class="sidebar-btn">
            <div class="sb-icon"><i class="bi bi-speedometer2"></i></div>
            Dashboard
        </a>
        <a href="resource_hub.html" class="sidebar-btn">
            <div class="sb-icon"><i class="bi bi-people-fill"></i></div>
            Resource Hub
        </a>
        <a href="visualize.html" class="sidebar-btn active">
            <div class="sb-icon"><i class="bi bi-calendar3"></i></div>
            Visualize
        </a>

        <div class="sidebar-section-title" style="margin-top: 30px;">Account</div>
        <button class="sidebar-btn" onclick="performLogout()">
            <div class="sb-icon"><i class="bi bi-box-arrow-right"></i></div>
            Logout
        </button>
    </div>

    <!-- HEADER -->
    <header class="app-header">
        <div class="d-flex align-items-center gap-3">
            <button class="menu-toggle d-lg-none" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <div class="header-title">Master Timeline Visualization</div>
        </div>
        <div class="d-flex align-items-center gap-3">
            <!-- Profile or Other Stuff -->
        </div>
    </header>

    <!-- CONTENT -->
    <main class="main-content">
        <div class="gantt-card">
            <div class="gantt-wrapper">
                <div class="gantt-container" id="ganttContainer">
                    <!-- Calendar and Rows will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        let projects = [];
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        async function loadProjects() {
            try {
                const res = await fetch('/api/projects');
                projects = await res.json();
                renderVisualize();
            } catch (err) {
                console.error("Load failed", err);
            }
        }

        function renderVisualize() {
            const container = document.getElementById('ganttContainer');
            container.innerHTML = '';

            // 1. Determine Date Range (Start with today, end with furthest dispatch)
            let minDate = new Date();
            let maxDate = new Date();
            maxDate.setMonth(maxDate.getMonth() + 6); // Default 6 months ahead

            projects.forEach(p => {
                if (p.start_date) {
                    const d = new Date(p.start_date);
                    if (d < minDate) minDate = new Date(d);
                }
                if (p.dispatch_date) {
                    const d = new Date(p.dispatch_date);
                    if (d > maxDate) maxDate = new Date(d);
                }
            });

            // Adjust to start of month
            minDate.setDate(1);
            maxDate.setMonth(maxDate.getMonth() + 1);
            maxDate.setDate(1);

            // 2. Render Header (Months & Weeks)
            const hd = document.createElement('div');
            hd.className = 'gantt-hd';

            const spacer = document.createElement('div');
            spacer.className = 'gantt-hd-spacer';
            hd.appendChild(spacer);

            let current = new Date(minDate);
            while (current < maxDate) {
                const mBlock = document.createElement('div');
                mBlock.className = 'month-block';

                const mLabel = document.createElement('div');
                mLabel.className = 'month-label';
                mLabel.innerText = `${monthNames[current.getMonth()]} ${current.getFullYear()}`;
                mBlock.appendChild(mLabel);

                const wRow = document.createElement('div');
                wRow.className = 'weeks-row';
                for (let i = 1; i <= 4; i++) {
                    const wCell = document.createElement('div');
                    wCell.className = 'week-cell';
                    wCell.innerText = `W${i}`;
                    wRow.appendChild(wCell);
                }
                mBlock.appendChild(wRow);

                hd.appendChild(mBlock);
                current.setMonth(current.getMonth() + 1);
            }
            container.appendChild(hd);

            // 3. Render Project Rows
            projects.forEach((p, idx) => {
                const row = document.createElement('div');
                row.className = 'project-row';

                const labelCell = document.createElement('div');
                labelCell.className = 'project-label';
                labelCell.innerHTML = `
                    <div class="p-code">${p.code || '---'}</div>
                    <div class="p-name">${p.name || 'Untitled'}</div>
                `;
                row.appendChild(labelCell);

                const timelineArea = document.createElement('div');
                timelineArea.className = 'timeline-area';

                if (p.start_date && p.dispatch_date) {
                    const start = new Date(p.start_date);
                    const end = new Date(p.dispatch_date);

                    const totalWidth = 320; // Width of a month block
                    const pixelsPerDay = totalWidth / 30; // approx

                    const leftOffset = (start - minDate) / (1000 * 60 * 60 * 24) * pixelsPerDay;
                    const width = (end - start) / (1000 * 60 * 60 * 24) * pixelsPerDay;

                    if (width > 0) {
                        const bar = document.createElement('div');
                        bar.className = 'bar-main';
                        const color = getProjectColor(idx);
                        bar.style.backgroundColor = color;
                        bar.style.left = `${leftOffset}px`;
                        bar.style.width = `${width}px`;
                        bar.innerHTML = `
                            <span>${p.name}</span>
                            <span class="bar-dates">${formatDate(p.start_date)} - ${formatDate(p.dispatch_date)}</span>
                        `;
                        bar.onclick = () => window.location.href = `project_phases.html?id=${p._id}`;
                        timelineArea.appendChild(bar);
                    }
                }

                row.appendChild(timelineArea);
                container.appendChild(row);
            });
        }

        function getProjectColor(idx) {
            const colors = ['#0d9488', '#2563eb', '#7c3aed', '#db2777', '#ea580c', '#16a34a'];
            return colors[idx % colors.length];
        }

        function formatDate(dt) {
            if (!dt) return '';
            const parts = dt.split('-');
            if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            const d = new Date(dt);
            if (isNaN(d.getTime())) return dt;
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            return `${dd}/${mm}/${d.getFullYear()}`;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function performLogout() {
            localStorage.removeItem('danprel_auth');
            localStorage.removeItem('danprel_role');
            window.location.replace('login.html');
        }

        window.onload = loadProjects;
    </script>
</body>

</html>
